defaults:
  - SimToolRealDynamicGraspSim2RealPointCloud
  - _self_

env:
  # Faster tabletop motion variant. This keeps the same pointcloud observation
  # and reward as the sim2real pointcloud baseline; only the planar object
  # speed curriculum is increased.
  dynamicGraspStartSpeedRange: [0.06, 0.14]
  dynamicGraspInitialSpeedRange: [0.18, 0.36]
